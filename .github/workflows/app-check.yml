name: app-check

on:
  push:
    paths:
      - "app/**"
      - ".github/workflows/app-check.yml"
  pull_request:
    paths:
      - "app/**"
      - ".github/workflows/app-check.yml"

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Install dependencies
        working-directory: app
        run: npm ci
      - name: Run app check
        working-directory: app
        run: npm run check

  e2e-ios:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Install dependencies
        working-directory: app
        run: npm ci
      - name: Build iOS app for Detox
        working-directory: app
        run: npm run e2e:build:ios
      - name: Run iOS E2E tests
        working-directory: app
        run: npm run e2e:test:ios
      - name: Upload Detox artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: detox-artifacts
          path: app/artifacts
          if-no-files-found: ignore
